  <rect x="640" y="548" width="280" height="160" fill="#141414" rx="2"/>
  <text x="780" y="638" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.1)" text-anchor="middle">IMAGE</text>
  <text x="780" y="732" font-family="Arial" font-weight="700" font-size="13" fill="white" text-anchor="middle">Straight Cut</text>
